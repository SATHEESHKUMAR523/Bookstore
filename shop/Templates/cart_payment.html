{% extends 'base.html' %}
{% block content %}

<div class="container mt-5">
    <h2 class="text-center mb-4">Cart Payment</h2>

    <div class="card p-4 shadow">
        <h4>Order Summary</h4>

        <ul class="list-group mb-3">
            {% for item in items %}
                <li class="list-group-item d-flex justify-content-between">
                    <span>{{ item.book.title }} x {{ item.qty }}</span>
                    <span>₹ {{ item.subtotal }}</span>
                </li>
            {% endfor %}
        </ul>

        <h4 class="text-end">Total: ₹{{ total }}</h4>

        <div class="text-center mt-3">
            <button id="rzp-button1" class="btn btn-success">Pay Now</button>
        </div>
    </div>
</div>

<form id="payment-form" method="POST" action="{% url 'payment_success' %}">
    {% csrf_token %}
    <input type="hidden" name="razorpay_order_id" id="razorpay_order_id">
    <input type="hidden" name="razorpay_payment_id" id="razorpay_payment_id">
    <input type="hidden" name="razorpay_signature" id="razorpay_signature">
</form>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    var options = {
        "key": "{{ razorpay_key }}",
        "amount": "{{ amount }}",
        "currency": "INR",
        "name": "Book Store",
        "description": "Cart Payment",
        "order_id": "{{ order.razorpay_order_id }}",
        "handler": function (response) {
            document.getElementById("razorpay_order_id").value = "{{ order.razorpay_order_id }}";
            document.getElementById("razorpay_payment_id").value = response.razorpay_payment_id;
            document.getElementById("razorpay_signature").value = response.razorpay_signature;
            document.getElementById("payment-form").submit();
        }
    };

    var rzp1 = new Razorpay(options);

    document.getElementById("rzp-button1").onclick = function(e) {
        rzp1.open();
        e.preventDefault();
    };
</script>

{% endblock %}
