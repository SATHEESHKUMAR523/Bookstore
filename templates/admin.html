<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <title>Admin Panel</title>

  <style>
    :root{
      --sidebar-w: 260px;
    }

    body{
      background: #f6f7fb;
    }

    /* Sidebar */
    .sidebar{
      width: var(--sidebar-w);
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      background: #111827; /* dark */
      color: #fff;
      overflow-y: auto;
    }

    .sidebar .brand{
      padding: 18px 16px;
      font-weight: 700;
      letter-spacing: .5px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .sidebar .nav-link{
      color: rgba(255,255,255,.78);
      padding: 10px 16px;
      border-radius: 10px;
      margin: 4px 10px;
      display: flex;
      gap: 10px;
      align-items: center;
      font-weight: 500;
    }

    .sidebar .nav-link:hover{
      background: rgba(255,255,255,.10);
      color: #fff;
    }

    .sidebar .nav-link.active{
      background: rgba(59,130,246,.22); /* blue tint */
      color: #fff;
      border: 1px solid rgba(59,130,246,.35);
    }

    .sidebar .small-title{
      padding: 14px 18px 6px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: rgba(255,255,255,.45);
    }

    /* Main content */
    .main{
      margin-left: var(--sidebar-w);
      padding: 22px;
    }

    /* Mobile */
    @media (max-width: 991px){
      .sidebar{
        position: static;
        width: 100%;
        height: auto;
      }
      .main{
        margin-left: 0;
      }
    }
  </style>
</head>

<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">📚 BookStore Admin</div>

    <div class="small-title">Main</div>
    <nav class="nav flex-column">
      <a class="nav-link active" href="#">🏠 Dashboard</a>
      <a class="nav-link" href="{% url 'booktable' %}">📖 Books</a>
      <a class="nav-link" href="{% url 'home' %}">🏠 Home</a>
    </nav>

    <div class="small-title">Manage</div>
    <nav class="nav flex-column">
      <a class="nav-link" href="{% url 'addbook' %}">➕ Add Book</a>
    </nav>

    <div class="small-title">Account</div>
    <nav class="nav flex-column mb-3">
      <a class="nav-link" href="#">⚙️ Settings</a>
      <a class="nav-link" href="{% url 'logout' %}">🚪 Logout</a>
    </nav>
  </aside>

  <!-- Page Content -->
  <main class="main">
    <!-- Top header -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0">Admin Panel</h4>
      <span class="badge text-bg-dark">Welcome, {{ request.session.username }}</span>
    </div>

    {% block content %}
    <!-- content comes here -->
    {% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
